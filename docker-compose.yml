version: "3.5"

services:
  api1:
    build: ./api
    hostname: api1
    expose:
      - "80"
    environment:
      DATABASE_URL: postgres://rinha:rinha@db:5432/rinha?sslmode=disable
    depends_on:
      - db
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: "512MB"

  api2:
    build: ./api
    hostname: api2
    expose:
      - "80"
    environment:
      DATABASE_URL: postgres://rinha:rinha@db:5432/rinha?sslmode=disable
    depends_on:
      - db
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: "512MB"

  nginx:
    image: nginx:latest
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "256MB"

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: rinha
      POSTGRES_PASSWORD: rinha
      POSTGRES_DB: rinha
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "0.65"
          memory: "1792MB"

volumes:
  postgres-data:
